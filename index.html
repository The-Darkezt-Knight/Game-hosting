<!doctype html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>BSIT-3D | Game Library</title>
    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap"
      rel="stylesheet"
    />
    <!-- Material Symbols -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary-container": "#2f3949",
              primary: "#4edea3",
              "primary-fixed": "#6ffbbe",
              "tertiary-fixed": "#d9e3f7",
              "primary-container": "#10b981",
              "on-tertiary-fixed": "#121c2a",
              "inverse-primary": "#006c49",
              "on-secondary-fixed": "#121c2a",
              "surface-tint": "#4edea3",
              secondary: "#bdc7d9",
              tertiary: "#bdc7db",
              "on-tertiary-fixed-variant": "#3d4757",
              "primary-fixed-dim": "#4edea3",
              "surface-container-highest": "#353534",
              "on-primary-container": "#00422b",
              "tertiary-fixed-dim": "#bdc7db",
              "on-error-container": "#ffdad6",
              "surface-variant": "#353534",
              "secondary-fixed-dim": "#bdc7d9",
              "on-surface": "#e5e2e1",
              outline: "#86948a",
              "outline-variant": "#3c4a42",
              "surface-container-high": "#2a2a2a",
              "surface-dim": "#131313",
              "on-background": "#e5e2e1",
              "surface-container-lowest": "#0e0e0e",
              "on-secondary-container": "#afb9cb",
              "secondary-container": "#404a59",
              "on-error": "#690005",
              "tertiary-container": "#99a3b6",
              "on-secondary-fixed-variant": "#3d4756",
              "surface-container-low": "#1c1b1b",
              "inverse-on-surface": "#313030",
              "on-secondary": "#27313f",
              "secondary-fixed": "#d9e3f6",
              surface: "#131313",
              background: "#131313",
              "on-tertiary": "#273140",
              "inverse-surface": "#e5e2e1",
              "on-primary-fixed-variant": "#005236",
              "error-container": "#93000a",
              error: "#ffb4ab",
              "surface-container": "#201f1f",
              "on-surface-variant": "#bbcabf",
              "on-primary": "#003824",
              "on-primary-fixed": "#002113",
              "surface-bright": "#393939",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              "container-max": "1440px",
              "margin-desktop": "40px",
              unit: "8px",
              "margin-mobile": "16px",
              gutter: "24px",
            },
            fontFamily: {
              "headline-md": ["Montserrat"],
              "label-sm": ["Inter"],
              "body-lg": ["Inter"],
              "headline-lg-mobile": ["Montserrat"],
              "headline-lg": ["Montserrat"],
              "display-lg": ["Montserrat"],
              "body-md": ["Inter"],
            },
            fontSize: {
              "headline-md": ["24px", { lineHeight: "1.3", fontWeight: "600" }],
              "label-sm": [
                "12px",
                { lineHeight: "1", letterSpacing: "0.05em", fontWeight: "600" },
              ],
              "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
              "headline-lg-mobile": [
                "24px",
                { lineHeight: "1.2", fontWeight: "700" },
              ],
              "headline-lg": ["32px", { lineHeight: "1.2", fontWeight: "700" }],
              "display-lg": [
                "48px",
                {
                  lineHeight: "1.1",
                  letterSpacing: "-0.02em",
                  fontWeight: "800",
                },
              ],
              "body-md": ["16px", { lineHeight: "1.5", fontWeight: "400" }],
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
        display: inline-block;
        vertical-align: middle;
      }
      .emerald-glow:hover {
        box-shadow: 0 0 20px 2px rgba(16, 185, 129, 0.2);
        transform: scale(1.03);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      body {
        background-color: #121212;
        color: #e5e2e1;
      }
      /* Custom scrollbar for tactical feel */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #131313;
      }
      ::-webkit-scrollbar-thumb {
        background: #10b981;
      }
    </style>
  </head>
  <body
    class="bg-background text-on-background selection:bg-primary selection:text-on-primary"
  >
    <!-- TopNavBar -->
    <header
      class="fixed top-0 w-full z-50 flex justify-between items-center px-margin-desktop h-16 bg-surface dark:bg-surface border-b border-outline-variant"
    >
      <div class="flex items-center gap-gutter">
        <span class="font-headline-md text-headline-md font-bold text-primary"
          >BSIT-3D</span
        >
        <nav class="hidden md:flex gap-gutter">
          <a
            class="text-primary font-bold border-b-2 border-primary pb-1 font-body-md text-body-md hover:text-primary transition-colors duration-200"
            href="#"
            >Library</a
          >
        </nav>
      </div>
      <div class="flex items-center gap-gutter">
        <button
          class="flex items-center text-on-surface-variant hover:text-primary transition-colors"
        >
          <span class="material-symbols-outlined">notifications</span>
        </button>
        <button
          class="flex items-center text-on-surface-variant hover:text-primary transition-colors"
        >
          <span class="material-symbols-outlined">settings</span>
        </button>
        <div
          class="flex items-center gap-2 px-4 py-1.5 bg-surface-container-high rounded-lg cursor-pointer hover:bg-surface-variant transition-colors Active: scale-95 transition-transform"
        >
          <span class="text-primary font-medium font-body-md text-body-md"
            >Profile</span
          >
        </div>
      </div>
    </header>

    <main
      class="pt-24 pb-16 px-margin-mobile md:px-margin-desktop min-h-screen"
    >
      <!-- Hero Search Section (Contextual) -->
      <div
        class="mb-12 flex flex-col md:flex-row md:items-end justify-between gap-gutter"
      >
        <div>
          <h1 class="font-display-lg text-display-lg text-on-background">
            Our game
          </h1>
          <p class="font-body-lg text-body-lg text-on-surface-variant mt-2">
            1 High-Performance Title Ready
          </p>
        </div>
        <div class="relative w-full md:w-96 group">
          <div
            class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
          >
            <span
              class="material-symbols-outlined text-on-surface-variant group-focus-within:text-primary transition-colors"
              >search</span
            >
          </div>
          <input
            class="w-full bg-surface-container border-none focus:ring-0 focus:border-l-2 focus:border-primary text-on-surface font-body-md text-body-md py-3 pl-10"
            placeholder="Filter games..."
            type="text"
          />
        </div>
      </div>

      <!-- Pure Iconic Game Grid -->
      <div
        class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-gutter"
      >
        <!-- Game Card 1: The Fixer -->
        <a
          class="w-96 h-96 overflow-hidden bg-surface-container emerald-glow group relative"
          href="/hub.html"
        >
          <img
            class="w-full h-full object-fill transition-transform duration-700 group-hover:scale-110"
            data-alt="A cinematic high-quality game cover for Aether Bound. It features a futuristic sky city with glowing cyan energy paths and high-tech flying vehicles. The art style is crisp and detailed with dramatic atmospheric lighting and a deep emerald green and dark grey palette to match the Nexus Play gaming brand aesthetic."
            src="/res/the_fixer_app_icon.jpg"
          />
          <div
            class="absolute inset-0 bg-gradient-to-t from-surface/80 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-4"
          >
            <span
              class="font-label-sm text-label-sm uppercase bg-primary text-on-primary px-2 py-1"
              >Online</span
            >
          </div>
        </a>
      </div>
    </main>

    <!-- Footer -->
    <footer
      class="w-full py-8 px-margin-desktop flex flex-col md:flex-row justify-between items-center gap-gutter bg-surface-container dark:bg-surface-container mt-auto"
    >
      <div class="flex flex-col gap-2 items-center md:items-start">
        <span class="font-headline-md text-headline-md font-bold text-primary"
          >Yearnet</span
        >
        <span class="font-label-sm text-label-sm text-on-surface-variant"
          >© 2026 Yearnet. High-Performance Gaming.</span
        >
      </div>
      <div class="flex gap-gutter">
        <a
          class="text-on-surface-variant font-label-sm text-label-sm hover:text-primary transition-colors"
          href="#"
          >Terms of Service</a
        >
        <a
          class="text-on-surface-variant font-label-sm text-label-sm hover:text-primary transition-colors"
          href="#"
          >Privacy Policy</a
        >
        <a
          class="text-on-surface-variant font-label-sm text-label-sm hover:text-primary transition-colors"
          href="#"
          >Support</a
        >
        <a
          class="text-on-surface-variant font-label-sm text-label-sm hover:text-primary transition-colors"
          href="#"
          >Status</a
        >
      </div>
      <div class="flex gap-4">
        <button
          class="w-10 h-10 flex items-center justify-center bg-surface hover:bg-primary/10 transition-colors group"
        >
          <span
            class="material-symbols-outlined text-on-surface-variant group-hover:text-primary"
            >language</span
          >
        </button>
        <button
          class="w-10 h-10 flex items-center justify-center bg-surface hover:bg-primary/10 transition-colors group"
        >
          <span
            class="material-symbols-outlined text-on-surface-variant group-hover:text-primary"
            >terminal</span
          >
        </button>
      </div>
    </footer>

    <script>
      // Micro-interactions for the tactical feel
      document.querySelectorAll(".emerald-glow").forEach((card) => {
        card.addEventListener("mouseenter", () => {
          // Potential for sound or additional FX
        });
      });

      // Simple smooth scroll and focus effects
      const searchInput = document.querySelector("input");
      if (searchInput) {
        searchInput.addEventListener("focus", () => {
          searchInput.parentElement.classList.add("emerald-glow");
        });
        searchInput.addEventListener("blur", () => {
          searchInput.parentElement.classList.remove("emerald-glow");
        });
      }
    </script>
  </body>
</html>
